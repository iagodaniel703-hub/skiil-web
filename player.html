<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Menu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Topo */
        .header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #007bff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        #user_info {
            font-size: 13px;
            color: #666;
        }

        /* Grade de Opções */
        .menu-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr); /* No celular fica um embaixo do outro */
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        /* No computador/tablet fica em 3 colunas */
        @media (min-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); max-width: 800px; }
        }

        .option-card {
            background: #151515;
            border: 2px solid #222;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .option-card:hover {
            border-color: #007bff;
            background: #1a1a1a;
            transform: scale(1.05);
        }

        .option-card i { font-size: 40px; display: block; margin-bottom: 15px; }
        .option-card span { font-weight: bold; font-size: 18px; color: #eee; }

        .live { border-left: 5px solid #ff4444; }
        .movies { border-left: 5px solid #ffbb33; }
        .series { border-left: 5px solid #00C851; }

        /* Rodapé */
        .footer {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #111;
            border-top: 1px solid #222;
        }

        .btn-footer {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Skkil Player</div>
        <div id="user_info">Carregando dados...</div>
    </div>

    <div class="menu-container">
        <div class="grid">
            <div class="option-card live" onclick="irParaCategorias('live')">
                <i>📺</i>
                <span>AO-VIVO</span>
            </div>

            <div class="option-card movies" onclick="irParaCategorias('movie')">
                <i>🎬</i>
                <span>FILMES</span>
            </div>

            <div class="option-card series" onclick="irParaCategorias('series')">
                <i>📂</i>
                <span>SÉRIES</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="btn-footer" onclick="location.reload()">🔄 Atualizar Lista</div>
        <div class="btn-footer" onclick="logout()">🚪 Sair</div>
    </div>

    <script>
        // Ao carregar, verifica se o usuário está logado
        window.onload = function() {
            const nome = localStorage.getItem('cliente_nome');
            const validade = localStorage.getItem('cliente_validade');

            if (!nome) {
                window.location.href = "index.html"; // Volta se não tiver login
            } else {
                document.getElementById('user_info').innerText = `Cliente: ${nome} | Validade: ${validade || 'Ativa'}`;
            }
        };

        // Função que leva para a próxima tela (Categorias)
        function irParaCategorias(tipo) {
            // Salva qual tipo foi escolhido para a próxima página saber o que carregar
            localStorage.setItem('tipo_escolhido', tipo);
            window.location.href = "categorias.html";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
