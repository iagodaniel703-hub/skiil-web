<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; padding:20px; text-align:center; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
        .card { background:#111; border:1px solid #007bff; padding:20px 10px; border-radius:8px; font-weight:bold; text-transform:uppercase; font-size:11px; min-height:60px; display:flex; align-items:center; justify-content:center; }
        .card:active { background:#007bff; }
        #status { color:#007bff; margin-top:50px; font-weight:bold; }
        .erro-msg { color: #ff4444; border: 1px solid #ff4444; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 13px; }
    </style>
</head>
<body>

    <h2 id="nome-id">SKKIL PLAYER</h2>
    <div id="status">Sincronizando com Servidor...</div>
    <div id="container" class="grid"></div>

    <script>
        async function iniciarCarregamento() {
            const container = document.getElementById('container');
            const status = document.getElementById('status');
            
            // 1. Pega e limpa o nome
            const nomeCli = localStorage.getItem('cliente_nome');
            if(nomeCli) document.getElementById('nome-id').innerText = nomeCli;

            // 2. PEGA E LIMPA O LINK (CRITICAL)
            let linkBruto = localStorage.getItem('cliente_lista');
            if(!linkBruto) {
                status.innerHTML = "Erro: Link não encontrado.";
                return;
            }

            // Limpa as barras invertidas (\/) e espaços extras
            const linkFinal = linkBruto.replace(/\\/g, "").trim(); 

            try {
                // 3. Chamada ao seu Proxy na Hostinger
                const meuProxy = "https://skkilarena.com.br/proxy.php?url=";
                const urlCompleta = meuProxy + encodeURIComponent(linkFinal);

                const response = await fetch(urlCompleta);
                const texto = await response.text();

                if (texto.includes("#EXTM3U")) {
                    localStorage.setItem('m3u_cache', texto);
                    status.style.display = 'none';
                    
                    const categorias = new Set();
                    const linhas = texto.split('\n');

                    linhas.forEach(l => {
                        const m = l.match(/group-title="([^"]+)"/);
                        if (m) categorias.add(m[1]);
                    });

                    Array.from(categorias).sort().forEach(cat => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerText = cat;
                        div.onclick = () => {
                            localStorage.setItem('cat_escolhida', cat);
                            window.location.href = 'canais.html';
                        };
                        container.appendChild(div);
                    });
                } else {
                    throw new Error("Resposta do servidor não é uma lista válida.");
                }
            } catch (e) {
                status.innerHTML = `
                    <div class="erro-msg">
                        <strong>FALHA NA SINCRONIZAÇÃO</strong><br>
                        O link no banco de dados pode estar off-line ou o arquivo 'proxy.php' na Hostinger está com erro.<br><br>
                        <button onclick="location.reload()" style="background:#007bff; color:#fff; border:none; padding:8px; border-radius:4px;">Tentar Novamente</button>
                    </div>`;
            }
        }

        iniciarCarregamento();
    </script>
</body>
</html>
