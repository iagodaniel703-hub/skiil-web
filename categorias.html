<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .btn-voltar { background: #333; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; margin-right: 15px; }
        .lista-categorias { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .categoria-card { background: #151515; border: 1px solid #333; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; }
        .categoria-card:hover { border-color: #007bff; }
        #status-msg { text-align: center; margin-top: 50px; color: #007bff; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-voltar">← Voltar</a>
        <h2 id="nome-usuario">CANAIS AO-VIVO</h2>
    </div>

    <div id="status-msg">Lendo sua lista de canais...</div>
    <div class="lista-categorias" id="categorias-container"></div>

    <script>
        const listaM3U = localStorage.getItem('cliente_lista');
        const nomeCliente = localStorage.getItem('cliente_nome');

        if (nomeCliente) {
            document.getElementById('nome-usuario').innerText = "Olá, " + nomeCliente;
        }

        async function carregarCategorias() {
            const container = document.getElementById('categorias-container');
            const statusMsg = document.getElementById('status-msg');

            if (!listaM3U) {
                statusMsg.innerText = "Lista não encontrada no sistema.";
                return;
            }

            try {
                // USANDO PROXY PARA EVITAR ERRO DE CONEXÃO (CORS)
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const response = await fetch(proxyUrl + encodeURIComponent(listaM3U));
                
                if (!response.ok) throw new Error("Erro ao baixar arquivo M3U");

                const data = await response.text();
                const linhas = data.split('\n');
                const categorias = new Set();

                linhas.forEach(linha => {
                    // Procura por group-title ou EXTGRP na sua lista
                    const match = linha.match(/group-title="([^"]+)"/) || linha.match(/#EXTGRP:([^\r\n]+)/);
                    if (match) {
                        categorias.add(match[1]);
                    }
                });

                if (categorias.size === 0) {
                    statusMsg.innerText = "Sua lista parece estar vazia ou o link está quebrado.";
                } else {
                    statusMsg.style.display = 'none';
                    // Criar botões para cada categoria encontrada
                    Array.from(categorias).sort().forEach(cat => {
                        const div = document.createElement('div');
                        div.className = 'categoria-card';
                        div.innerText = cat;
                        div.onclick = () => {
                            localStorage.setItem('categoria_selecionada', cat);
                            // Aqui você enviaria para uma página de canais, ex: canais.html
                            alert('Abrindo canais de: ' + cat);
                        };
                        container.appendChild(div);
                    });
                }

            } catch (error) {
                console.error(error);
                statusMsg.innerHTML = "Erro ao carregar lista.<br><small>Verifique se o link no painel termina em .php ou .m3u8</small>";
                statusMsg.style.color = "red";
            }
        }

        carregarCategorias();
    </script>
</body>
</html>
