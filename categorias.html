<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 20px;
            background: #111;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #007bff;
        }

        .btn-voltar {
            background: #222;
            color: white;
            border: 1px solid #333;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 15px;
        }

        .title { font-size: 18px; font-weight: bold; text-transform: uppercase; }

        #loading {
            text-align: center;
            margin-top: 50px;
            color: #007bff;
        }

        .lista-categorias {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .categoria-card {
            background: #151515;
            border: 1px solid #222;
            padding: 20px 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .categoria-card:hover {
            border-color: #007bff;
            background: #1a1a1a;
            transform: translateY(-3px);
        }

        .categoria-card i { font-size: 24px; margin-bottom: 10px; color: #007bff; }
        .categoria-card span { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn-voltar" onclick="window.location.href='player.html'">⬅ Voltar</button>
        <div class="title" id="titulo_pagina">Categorias</div>
    </div>

    <div id="loading">Carregando categorias da sua lista...</div>

    <div class="lista-categorias" id="container_categorias">
        </div>

    <script>
        const tipoEscolhido = localStorage.getItem('tipo_escolhido'); // 'live', 'movie' ou 'series'
        const urlM3U = localStorage.getItem('cliente_lista');

        window.onload = function() {
            if (!urlM3U) {
                window.location.href = "index.html";
                return;
            }
            
            // Ajusta o título conforme a escolha anterior
            const titulos = { 'live': 'Canais Ao-Vivo', 'movie': 'Filmes', 'series': 'Séries' };
            document.getElementById('titulo_pagina').innerText = titulos[tipoEscolhido] || 'Categorias';

            buscarCategorias();
        };

        async function buscarCategorias() {
            try {
                // Usamos um proxy para evitar erro de CORS se necessário
                const response = await fetch(urlM3U);
                const textoM3U = await response.text();
                
                // Regex para capturar o group-title="NOME DA CATEGORIA"
                const regex = /group-title="([^"]+)"/g;
                let match;
                const categoriasSet = new Set();

                while ((match = regex.exec(textoM3U)) !== null) {
                    categoriasSet.add(match[1]);
                }

                exibirCategorias(Array.from(categoriasSet).sort());
            } catch (error) {
                console.error("Erro ao ler lista:", error);
                document.getElementById('loading').innerText = "Erro ao carregar lista. Verifique sua conexão.";
            }
        }

        function exibirCategorias(categorias) {
            const container = document.getElementById('container_categorias');
            const loading = document.getElementById('loading');
            
            loading.style.display = "none";
            container.innerHTML = "";

            categorias.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'categoria-card';
                card.onclick = () => {
                    localStorage.setItem('categoria_selecionada', cat);
                    window.location.href = 'canais.html';
                };

                // Ícone padrão dependendo do tipo
                let icone = tipoEscolhido === 'live' ? '📺' : (tipoEscolhido === 'movie' ? '🎬' : '📂');

                card.innerHTML = `<i>${icone}</i><span>${cat}</span>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
