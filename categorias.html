<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        /* Design focado em dispositivos móveis (Mobile-First) */
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 15px; 
            user-select: none; /* Impede selecionar texto no APK */
        }
        .header { 
            display: flex; 
            align-items: center; 
            border-bottom: 2px solid #007bff; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
        }
        .btn-voltar { 
            background: #1a1a1a; 
            color: #fff; 
            padding: 8px 15px; 
            border-radius: 5px; 
            text-decoration: none; 
            font-size: 14px;
            border: 1px solid #333;
        }
        .grid-categorias { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Duas colunas para celular */
            gap: 12px; 
        }
        .card { 
            background: linear-gradient(145deg, #111, #1a1a1a); 
            border: 1px solid #222; 
            padding: 25px 10px; 
            text-align: center; 
            border-radius: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 11px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .card:active { 
            transform: scale(0.95); 
            border-color: #007bff; 
            background: #007bff22;
        }
        #status { 
            text-align: center; 
            margin-top: 50px; 
            color: #007bff; 
            font-size: 14px;
        }
        .erro-alerta {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-voltar">SAIR</a>
        <h3 id="nome-usuario" style="margin-left: 15px; font-size: 16px;">SKKIL PLAYER</h3>
    </div>

    <div id="status">Sincronizando com o servidor...</div>
    <div class="grid-categorias" id="categorias-container"></div>

    <script>
        // Dados vindos do login
        const listaUrl = localStorage.getItem('cliente_lista');
        const nome = localStorage.getItem('cliente_nome');

        if(nome) document.getElementById('nome-usuario').innerText = nome;

        async function carregarGrade() {
            const container = document.getElementById('categorias-container');
            const status = document.getElementById('status');

            if (!listaUrl) {
                status.innerHTML = "<div class='erro-alerta'>Lista não encontrada. Faça login novamente.</div>";
                return;
            }

            try {
                // SOLUÇÃO REAL: Usando seu Proxy na Hostinger para burlar o bloqueio do APK
                const proxyProprio = "https://skkilarena.com.br/proxy_m3u.php?url=";
                const response = await fetch(proxyProprio + encodeURIComponent(listaUrl));
                
                if (!response.ok) throw new Error();

                const m3uTexto = await response.text();
                const linhas = m3uTexto.split('\n');
                const categoriasSet = new Set();

                linhas.forEach(linha => {
                    const match = linha.match(/group-title="([^"]+)"/);
                    if (match) categoriasSet.add(match[1]);
                });

                if (categoriasSet.size === 0) {
                    status.innerHTML = "<div class='erro-alerta'>Nenhuma categoria encontrada no servidor.</div>";
                } else {
                    status.style.display = 'none';
                    Array.from(categoriasSet).sort().forEach(cat => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerText = cat;
                        div.onclick = () => {
                            localStorage.setItem('categoria_ativa', cat);
                            alert("Carregando " + cat + "...");
                        };
                        container.appendChild(div);
                    });
                }

            } catch (e) {
                status.innerHTML = `
                    <div class="erro-alerta">
                        <strong>ERRO DE CONEXÃO</strong><br>
                        Não foi possível ler os dados do servidor Hostinger.
                    </div>`;
            }
        }

        carregarGrade();
    </script>
</body>
</html>
