<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 25px; }
        .btn-voltar { background: #222; color: white; padding: 10px 18px; border-radius: 8px; text-decoration: none; margin-right: 20px; border: 1px solid #333; font-size: 14px; }
        .lista-categorias { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .categoria-card { background: #151515; border: 1px solid #333; padding: 18px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .categoria-card:hover { border-color: #007bff; background: #007bff22; transform: translateY(-2px); }
        #status-msg { text-align: center; margin-top: 50px; color: #007bff; font-size: 16px; }
        .erro-alerta { color: #ff4444; background: rgba(255, 68, 68, 0.1); padding: 20px; border-radius: 10px; border: 1px solid #ff4444; line-height: 1.5; text-align: center; }
        .btn-recarregar { margin-top: 15px; padding: 10px 20px; background: #ff4444; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-voltar">← SAIR</a>
        <h2 id="nome-usuario">CANAIS AO-VIVO</h2>
    </div>

    <div id="status-msg">Iniciando conexão segura...</div>
    <div class="lista-categorias" id="categorias-container"></div>

    <script>
        const listaM3U = localStorage.getItem('cliente_lista');
        const nomeCliente = localStorage.getItem('cliente_nome');

        if (nomeCliente) {
            document.getElementById('nome-usuario').innerText = "Olá, " + nomeCliente;
        }

        async function carregarCategorias() {
            const container = document.getElementById('categorias-container');
            const statusMsg = document.getElementById('status-msg');

            if (!listaM3U) {
                statusMsg.innerHTML = "<div class='erro-alerta'>Erro: Link da lista não encontrado.</div>";
                return;
            }

            try {
                // 1. LIMPEZA DO LINK: Remove as barras invertidas (\/) que vimos no seu banco de dados
                const urlLimpa = listaM3U.replace(/\\\//g, "/");
                
                // 2. PROXY: Usamos o AllOrigins para converter o link HTTP em um canal aceito pelo GitHub HTTPS
                const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(urlLimpa);
                
                statusMsg.innerText = "Baixando lista de canais...";
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("O servidor da lista não respondeu.");

                const textoM3U = await response.text();
                
                // Valida se o que baixamos é realmente uma lista IPTV
                if (!textoM3U.includes("#EXTM3U")) {
                    throw new Error("O link no painel não aponta para uma lista M3U válida.");
                }

                const linhas = textoM3U.split('\n');
                const categoriasSet = new Set();

                // Extração das categorias (group-title)
                linhas.forEach(linha => {
                    const match = linha.match(/group-title="([^"]+)"/);
                    if (match && match[1].trim() !== "") {
                        categoriasSet.add(match[1]);
                    }
                });

                if (categoriasSet.size === 0) {
                    statusMsg.innerHTML = "<div class='erro-alerta'>Lista lida com sucesso, mas não encontramos categorias nela.</div>";
                } else {
                    statusMsg.style.display = 'none';
                    Array.from(categoriasSet).sort().forEach(cat => {
                        const card = document.createElement('div');
                        card.className = 'categoria-card';
                        card.innerText = cat;
                        card.onclick = () => {
                            localStorage.setItem('categoria_ativa', cat);
                            alert("Você escolheu: " + cat);
                            // No futuro, aqui redirecionamos para canais.html
                        };
                        container.appendChild(card);
                    });
                }

            } catch (error) {
                console.error(error);
                statusMsg.innerHTML = `
                    <div class="erro-alerta">
                        <strong>Bloqueio de Segurança Detectado</strong><br>
                        O navegador impediu a conexão direta com o servidor de canais.<br><br>
                        <strong>Tente o seguinte:</strong><br>
                        1. Use uma <b>Guia Anônima</b> no Chrome.<br>
                        2. Verifique se o link no painel termina em .php ou .m3u8.<br>
                        <button class="btn-recarregar" onclick="location.reload()">Tentar Novamente</button>
                    </div>`;
            }
        }

        carregarCategorias();
    </script>
</body>
</html>
