<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 25px; }
        .btn-voltar { background: #222; color: white; padding: 10px 18px; border-radius: 8px; text-decoration: none; margin-right: 20px; border: 1px solid #333; }
        .lista-categorias { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .categoria-card { background: #151515; border: 1px solid #333; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .categoria-card:hover { border-color: #007bff; background: #007bff22; transform: translateY(-3px); }
        #status-msg { text-align: center; margin-top: 60px; color: #007bff; font-size: 18px; }
        .erro-alerta { color: #ff4444; background: rgba(255, 68, 68, 0.1); padding: 15px; border-radius: 10px; border: 1px solid #ff4444; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-voltar">← SAIR</a>
        <h2 id="nome-usuario">CANAIS AO-VIVO</h2>
    </div>

    <div id="status-msg">Conectando ao servidor seguro...</div>
    <div class="lista-categorias" id="categorias-container"></div>

    <script>
        const listaM3U = localStorage.getItem('cliente_lista');
        const nomeCliente = localStorage.getItem('cliente_nome');

        if (nomeCliente) {
            document.getElementById('nome-usuario').innerText = "Olá, " + nomeCliente;
        }

        async function carregarCategorias() {
            const container = document.getElementById('categorias-container');
            const statusMsg = document.getElementById('status-msg');

            if (!listaM3U) {
                statusMsg.innerHTML = "<div class='erro-alerta'>Erro: Link da lista não encontrado.</div>";
                return;
            }

            try {
                // Limpa o link de barras extras que o JSON pode ter gerado
                const urlLimpa = listaM3U.replace(/\\\//g, "/");
                
                // Usamos o proxy do CorsProxy.io que lida melhor com HTTP -> HTTPS
                const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(urlLimpa);
                
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error("Erro no Proxy");

                const textoM3U = await response.text();
                
                // Verifica se o conteúdo parece uma lista M3U
                if (!textoM3U.includes("#EXTM3U")) {
                    throw new Error("O servidor retornou um arquivo inválido.");
                }

                const linhas = textoM3U.split('\n');
                const categoriasSet = new Set();

                linhas.forEach(linha => {
                    if (linha.includes('group-title="')) {
                        const match = linha.match(/group-title="([^"]+)"/);
                        if (match && match[1]) categoriasSet.add(match[1]);
                    }
                });

                if (categoriasSet.size === 0) {
                    statusMsg.innerHTML = "<div class='erro-alerta'>Lista carregada, mas nenhuma categoria encontrada.</div>";
                } else {
                    statusMsg.style.display = 'none';
                    Array.from(categoriasSet).sort().forEach(cat => {
                        const card = document.createElement('div');
                        card.className = 'categoria-card';
                        card.innerText = cat;
                        card.onclick = () => {
                            localStorage.setItem('categoria_ativa', cat);
                            alert("Categoria selecionada: " + cat);
                        };
                        container.appendChild(card);
                    });
                }

            } catch (error) {
                console.error(error);
                statusMsg.innerHTML = `
                    <div class="erro-alerta">
                        <strong>Bloqueio de Segurança Detectado</strong><br>
                        O navegador impediu a conexão com o servidor de canais.<br><br>
                        <strong>DICA:</strong> Tente abrir o site em uma <b>Guia Anônima</b> ou use um navegador que aceite conteúdo misto.
                    </div>`;
            }
        }

        carregarCategorias();
    </script>
</body>
</html>
