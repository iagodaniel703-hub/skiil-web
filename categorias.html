<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .btn-voltar {
            background: #333;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }
        .lista-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .categoria-card {
            background: #151515;
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .categoria-card:hover {
            border-color: #007bff;
            background: #1a1a1a;
        }
        #status-msg {
            text-align: center;
            color: #007bff;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-voltar">← Voltar</a>
        <h2 id="nome-usuario">CANAIS AO-VIVO</h2>
        <span></span>
    </div>

    <div id="status-msg">Carregando categorias...</div>
    <div class="lista-categorias" id="categorias-container"></div>

    <script>
        // 1. Pega os dados que salvamos no login (script.js)
        const listaM3U = localStorage.getItem('cliente_lista');
        const nomeCliente = localStorage.getItem('cliente_nome');

        if (nomeCliente) {
            document.getElementById('nome-usuario').innerText = "Olá, " + nomeCliente;
        }

        async function carregarCategorias() {
            const container = document.getElementById('categorias-container');
            const statusMsg = document.getElementById('status-msg');

            if (!listaM3U) {
                statusMsg.innerText = "Erro: Lista não encontrada. Faça login novamente.";
                statusMsg.style.color = "red";
                return;
            }

            try {
                // Faz a leitura da lista M3U (via proxy para evitar erro de CORS se necessário)
                const response = await fetch(listaM3U);
                const data = await response.text();

                // Lógica simples para extrair nomes de grupos (#EXTGRP ou group-title)
                const linhas = data.split('\n');
                const categorias = new Set();

                linhas.forEach(linha => {
                    if (linha.includes('group-title="')) {
                        const match = linha.match(/group-title="([^"]+)"/);
                        if (match) categorias.add(match[1]);
                    }
                });

                if (categorias.size === 0) {
                    statusMsg.innerText = "Nenhuma categoria encontrada na sua lista.";
                } else {
                    statusMsg.style.display = 'none';
                    categorias.forEach(cat => {
                        const div = document.createElement('div');
                        div.className = 'categoria-card';
                        div.innerText = cat;
                        div.onclick = () => alert('Abrindo categoria: ' + cat);
                        container.appendChild(div);
                    });
                }

            } catch (error) {
                console.error(error);
                statusMsg.innerText = "Erro ao carregar lista. Verifique o link M3U no painel.";
                statusMsg.style.color = "red";
            }
        }

        carregarCategorias();
    </script>
</body>
</html>
