<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; padding:20px; text-align:center; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
        .card { 
            background:#111; border:1px solid #007bff; padding:20px 10px; 
            border-radius:8px; font-weight:bold; text-transform:uppercase; 
            font-size:11px; min-height:60px; display:flex; align-items:center; justify-content:center;
        }
        .card:active { background:#007bff; }
        #status { color:#007bff; margin-top:50px; font-weight:bold; }
    </style>
</head>
<body>

    <h2 id="nome-id">SKKIL PLAYER</h2>
    <div id="status">Sincronizando via Servidor Seguro...</div>
    <div id="container" class="grid"></div>

    <script>
        async function carregarComBypass() {
            const container = document.getElementById('container');
            const status = document.getElementById('status');

            // 1. Pega os dados e limpa o nome
            const listaM3U = localStorage.getItem('cliente_lista');
            const nomeCli = localStorage.getItem('cliente_nome');
            if(nomeCli) document.getElementById('nome-id').innerText = nomeCli;

            if (!listaM3U) {
                status.innerHTML = "Erro: Link não encontrado. Faça login novamente.";
                return;
            }

            try {
                // 2. LIMPEZA TOTAL: Remove todas as barras invertidas (\) que o banco gera
                const linkLimpo = listaM3U.replace(/\\/g, "").trim(); 
                
                // 3. Chamada ao seu Proxy na Hostinger
                const meuProxy = "https://skkilarena.com.br/proxy.php?url="; 
                const urlFinal = meuProxy + encodeURIComponent(linkLimpo);

                const response = await fetch(urlFinal);
                const texto = await response.text();

                if (texto.includes("#EXTM3U")) {
                    // Salva a lista para a próxima página carregar instantâneo
                    localStorage.setItem('m3u_cache', texto);
                    
                    status.style.display = 'none';
                    const categorias = new Set();
                    const linhas = texto.split('\n');

                    linhas.forEach(l => {
                        const m = l.match(/group-title="([^"]+)"/);
                        if (m) categorias.add(m[1]);
                    });

                    Array.from(categorias).sort().forEach(cat => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerText = cat;
                        
                        // Redirecionamento
                        div.onclick = () => {
                            localStorage.setItem('cat_escolhida', cat);
                            window.location.href = 'canais.html';
                        };
                        
                        container.appendChild(div);
                    });
                } else {
                    throw new Error("Resposta inválida");
                }
            } catch (e) {
                status.innerHTML = "Erro de Sincronização.<br>Tente fechar o app e abrir novamente.";
                status.style.color = "red";
            }
        }

        carregarComBypass();
    </script>
</body>
</html>
