<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Estilo dos Cards */
        .card { 
            background: #111; border: 1px solid #222; padding: 25px 10px; 
            text-align: center; border-radius: 12px; font-weight: bold; 
            text-transform: uppercase; font-size: 11px;
        }

        /* Efeito de carregamento (Skeleton) */
        .skeleton {
            background: #1a1a1a;
            height: 80px;
            border-radius: 12px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h3 id="nome-id">SKKIL PLAYER</h3>
    </div>

    <div id="loading-grid" class="grid">
        <div class="skeleton"></div><div class="skeleton"></div>
        <div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div id="container" class="grid" style="display:none;"></div>

    <script>
        const listaUrl = localStorage.getItem('cliente_lista');
        const proxy = "https://skkilarena.com.br/proxy.php?url=";

        async function obterDados() {
            // Verifica se já temos a lista salva hoje para não baixar de novo
            let listaSalva = localStorage.getItem('m3u_cache');
            
            if (!listaSalva) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(listaUrl));
                    listaSalva = await response.text();
                    localStorage.setItem('m3u_cache', listaSalva); // Salva no celular
                } catch (e) {
                    document.getElementById('loading-grid').innerHTML = "Erro ao conectar.";
                    return;
                }
            }
            processarCategorias(listaSalva);
        }

        function processarCategorias(texto) {
            const categorias = new Set();
            const linhas = texto.split('\n');

            linhas.forEach(l => {
                const m = l.match(/group-title="([^"]+)"/);
                if (m) categorias.add(m[1]);
            });

            const container = document.getElementById('container');
            const loading = document.getElementById('loading-grid');

            Array.from(categorias).sort().forEach(cat => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerText = cat;
                div.onclick = () => {
                    localStorage.setItem('cat_escolhida', cat);
                    window.location.href = 'canais.html';
                };
                container.appendChild(div);
            });

            loading.style.display = 'none';
            container.style.display = 'grid';
        }

        obterDados();
    </script>
</body>
</html>
