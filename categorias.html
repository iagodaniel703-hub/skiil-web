<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skkil Player - Categorias</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { 
            background: #111; border: 1px solid #222; padding: 25px 10px; 
            text-align: center; border-radius: 12px; font-weight: bold; 
            text-transform: uppercase; font-size: 11px;
        }
        .card:active { background: #007bff; border-color: #007bff; }
        #status { text-align: center; margin-top: 40px; color: #007bff; }
        .erro-box { border: 1px solid red; padding: 15px; color: #ff6666; border-radius: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <h3 id="nome-user" style="text-align:center">SKKIL PLAYER</h3>
    <div id="status">Limpando conexão e carregando...</div>
    <div id="container" class="grid"></div>

    <script>
        async function carregarTudo() {
            const container = document.getElementById('container');
            const status = document.getElementById('status');
            
            // 1. Pega os dados do localStorage
            const nome = localStorage.getItem('cliente_nome');
            const linkBruto = localStorage.getItem('cliente_lista');
            if(nome) document.getElementById('nome-user').innerText = "Olá, " + nome;

            if(!linkBruto) {
                status.innerHTML = "Erro: Link não encontrado. Faça login novamente.";
                return;
            }

            try {
                // 2. LIMPEZA CRÍTICA: Remove as barras invertidas (\/) que o banco gera
                const urlLimpa = linkBruto.replace(/\\/g, "");
                
                // 3. Usa o SEU proxy na Hostinger (Verifique se o nome do arquivo está correto)
                const meuProxy = "https://skkilarena.com.br/proxy.php?url=";
                
                const response = await fetch(meuProxy + encodeURIComponent(urlLimpa));
                const data = await response.text();

                if (!data.includes("#EXTM3U")) {
                    throw new Error("Resposta inválida do servidor.");
                }

                // 4. Salva no cache para as próximas páginas
                localStorage.setItem('m3u_cache', data);

                const categorias = new Set();
                const linhas = data.split('\n');

                linhas.forEach(linha => {
                    const match = linha.match(/group-title="([^"]+)"/);
                    if (match) categorias.add(match[1]);
                });

                status.style.display = 'none';
                Array.from(categorias).sort().forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerText = cat;
                    div.onclick = () => {
                        localStorage.setItem('cat_escolhida', cat);
                        window.location.href = 'canais.html';
                    };
                    container.appendChild(div);
                });

            } catch (e) {
                status.innerHTML = `
                    <div class="erro-box">
                        <strong>ERRO DE CONEXÃO</strong><br>
                        O servidor da Hostinger não conseguiu ler a lista.<br><br>
                        Dica: Verifique se o arquivo <b>proxy.php</b> está na Hostinger.
                    </div>`;
            }
        }

        carregarTudo();
    </script>
</body>
</html>
