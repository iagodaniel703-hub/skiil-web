<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKKIL PLAYER - IPTV Web</title>
    <style>
        /* Estilo moderno em preto e azul elétrico conforme seu padrão */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background: #151515;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
            width: 100%;
            max-width: 350px;
            text-align: center;
            border: 1px solid #007bff;
        }

        h2 {
            color: #007bff;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaaaaa;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #0056b3;
            transform: scale(1.02);
        }

        #mensagem_erro {
            color: #ff4444;
            font-size: 14px;
            margin-top: 15px;
            display: none; /* Escondido por padrão */
            background: rgba(255, 68, 68, 0.1);
            padding: 10px;
            border-radius: 5px;
        }

        .footer-info {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Skkil Player</h2>
        
        <div class="input-group">
            <label for="input_mac">Endereço MAC do Dispositivo</label>
            <input type="text" id="input_mac" placeholder="Ex: 00:00:00:00:00:00" autocomplete="off">
        </div>

        <button onclick="realizarLogin()">Entrar no Player</button>

        <div id="mensagem_erro"></div>

        <div class="footer-info">
            Sistema de Autenticação skkilarena.com.br
        </div>
    </div>

    <script src="script.js?v=1.2"></script>

</body>
</html>
