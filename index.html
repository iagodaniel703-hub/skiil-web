<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayCine - IPTV Web</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        header { background: #050505; border-bottom: 2px solid #00FFFF; padding: 15px; text-align: center; }
        h1 { color: #00FFFF; margin: 0; font-size: 24px; text-shadow: 0 0 10px #00FFFF; }
        
        /* Menu de Abas Principais */
        .tabs { display: flex; justify-content: space-around; background: #111; padding: 10px 0; position: sticky; top: 0; }
        .tab-btn { color: #fff; border: none; background: none; font-weight: bold; cursor: pointer; padding: 10px; }
        .tab-btn.active { color: #00FFFF; border-bottom: 2px solid #00FFFF; }

        /* Sub-abas de Categorias */
        .sub-tabs { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: #080808; }
        .sub-btn { background: #222; color: #ddd; border: 1px solid #333; padding: 5px 15px; border-radius: 20px; white-space: nowrap; }

        /* Grid de Conteúdo */
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #151515; border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: #00FFFF; transform: scale(1.05); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card p { font-size: 12px; padding: 8px; text-align: center; margin: 0; }
    </style>
</head>
